# Linux (build + tests), Windows (ZIP + windeployqt), macOS (DMG + macdeployqt) — same triggers for all jobs.
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  QTFRAMEWORK_BYPASS_LICENSE_CHECK: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Linux (Ninja + tests)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.*"
          target: desktop
          arch: linux_gcc_64
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-test-dev libsqlite3-dev ninja-build pkg-config
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure

  windows:
    name: Windows (MSVC + vcpkg + windeployqt)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:GITHUB_WORKSPACE\vcpkg"
          & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat"

      - name: vcpkg install (sqlite3 from manifest)
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.*"
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Configure & build
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          CMAKE_PREFIX_PATH: ${{ env.QT_ROOT_DIR }}
        shell: pwsh
        run: |
          $tc = Join-Path $env:VCPKG_ROOT "scripts\buildsystems\vcpkg.cmake"
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 "-DCMAKE_TOOLCHAIN_FILE=$tc" "-DCMAKE_PREFIX_PATH=$env:CMAKE_PREFIX_PATH" -DBUILD_TESTING:BOOL=OFF
          cmake --build build --config Release --parallel

      - name: Stage, windeployqt, ZIP
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          CMAKE_PREFIX_PATH: ${{ env.QT_ROOT_DIR }}
        shell: pwsh
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE "poker\packaging\windows\build-release.ps1"
          $build = Join-Path $env:GITHUB_WORKSPACE "build"
          $stage = Join-Path $env:GITHUB_WORKSPACE "dist\windows"
          if (-not (Test-Path -LiteralPath $script)) { throw "Script not found: $script" }
          & $script -BuildDir $build -StagingDir $stage -NoConfigure

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer (Inno Setup)
        shell: pwsh
        run: |
          $ps1 = Join-Path $env:GITHUB_WORKSPACE "poker\packaging\windows\build-installer.ps1"
          & $ps1 -StagingDir (Join-Path $env:GITHUB_WORKSPACE "dist\windows")

      - name: Upload artifact (ZIP + folder + setup)
        uses: actions/upload-artifact@v4
        with:
          name: TexasHoldemGym-Windows-x64
          path: |
            TexasHoldemGym-Windows-x64*.zip
            dist/windows/
            dist/TexasHoldemGym-Setup-*.exe

  macos:
    name: macOS (Ninja + macdeployqt DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install sqlite ninja

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.*"
          host: mac
          target: desktop
          arch: clang_64

      - name: Configure & build
        env:
          CMAKE_PREFIX_PATH: ${{ env.QT_ROOT_DIR }}
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
            -DSQLite3_ROOT="$(brew --prefix sqlite)" \
            -DBUILD_TESTING:BOOL=OFF
          cmake --build build -j"$(sysctl -n hw.ncpu)"

      - name: macdeployqt, codesign & DMG
        env:
          QT_ROOT_DIR: ${{ env.QT_ROOT_DIR }}
        run: |
          set -euo pipefail
          QML="${GITHUB_WORKSPACE}/poker/qml"
          QT_BIN="${QT_ROOT_DIR}/bin"
          GITHASH=$(git -C "${GITHUB_WORKSPACE}" rev-parse --short=8 HEAD)
          ARCH=$(uname -m)
          DMG_NAME="TexasHoldemGym-macOS-${ARCH}-${GITHASH}.dmg"
          # Homebrew sqlite lives under /opt/homebrew/... — pass -libpath so macdeployqt
          # embeds libsqlite3.dylib instead of leaving an absolute /opt/homebrew reference.
          DEPLOY_EXTRA=()
          if brew --prefix sqlite >/dev/null 2>&1; then
            DEPLOY_EXTRA+=(-libpath="$(brew --prefix sqlite)/lib")
          fi
          cd "${GITHUB_WORKSPACE}/build/poker"
          "${QT_BIN}/macdeployqt" Poker.app -qmldir="${QML}" "${DEPLOY_EXTRA[@]}"
          # Surface any remaining absolute Homebrew references at build time.
          bad=0
          while IFS= read -r -d '' macho; do
            while IFS= read -r line; do
              p="${line#"${line%%[![:space:]]*}"}"; p="${p%% (*}"
              case "$p" in
                /opt/homebrew/*|/usr/local/*)
                  echo "UNRESOLVED: ${macho} -> ${p}" >&2; bad=1;;
              esac
            done < <(otool -L "$macho" 2>/dev/null | tail -n +2)
          done < <(find Poker.app \( -name '*.dylib' -o -name Poker -o -path '*/Frameworks/*/Versions/*/*' \) -type f -print0)
          [[ "$bad" -eq 0 ]] || { echo "bundle still references external dylibs"; exit 1; }
          codesign --force --deep --sign - Poker.app
          rm -f "${DMG_NAME}"
          hdiutil create -volname "Texas Hold'em Gym" -srcfolder Poker.app -ov -format UDZO "${DMG_NAME}"
          mkdir -p "${GITHUB_WORKSPACE}/dist/macos"
          cp -f "${DMG_NAME}" "${GITHUB_WORKSPACE}/dist/macos/${DMG_NAME}"
          echo "DMG=${GITHUB_WORKSPACE}/dist/macos/${DMG_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TexasHoldemGym-macOS-${{ runner.arch }}
          path: |
            dist/macos/*.dmg
            build/poker/Poker.app
