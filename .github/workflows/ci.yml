name: CI
on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    # Opt in to Node 24 for JS actions until upstream actions ship Node 24 runtimes
    # (see https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          target: desktop
          arch: linux_gcc_64
          # Do not use `modules` for qtbase/qtdeclarative — that input is for *add-on* modules (qtcharts, …).
          # Default aqt install includes qtbase + qtdeclarative (Quick/QML).
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-test-dev libsqlite3-dev ninja-build pkg-config
      - name: Configure
        env:
          QTFRAMEWORK_BYPASS_LICENSE_CHECK: "1"
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure
